services:
  api:
    image: crpi-nw57zvj0cctph9tp.ap-southeast-1.personal.cr.aliyuncs.com/cayley-hck/myspace:api-latest
    container_name: superset-api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    networks:
      - superset-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  superset-network:
    driver: bridge
