services:
  # ============================================
  # Dependency Installer (runs once, then exits)
  # ============================================
  deps:
    image: oven/bun:1.3.6-alpine
    container_name: superset-deps
    working_dir: /app
    command: bun install
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - superset-network

  # ============================================
  # Electric SQL Sync Engine
  # ============================================
  electric:
    image: electricsql/electric:1.4.13
    container_name: superset-electric-dev
    ports:
      - "3009:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL_UNPOOLED}
      ELECTRIC_SECRET: ${ELECTRIC_SECRET:-local_electric_dev_secret}
      ELECTRIC_WRITE_TO_PG_MODE: direct_writes
      LOGICAL_PUBLISHER_HOST: ${LOGICAL_PUBLISHER_HOST:-electric}
    restart: unless-stopped
    networks:
      - superset-network

  # ============================================
  # Caddy Reverse Proxy (HTTP/2 for SSE)
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: superset-caddy-dev
    ports:
      - "3010:3010"
    volumes:
      - ./docker/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - superset-network

  # ============================================
  # All Next.js Apps (api, web, admin, marketing, docs)
  # ============================================
  api:
    image: oven/bun:1.3.6-alpine
    container_name: superset-apps-dev
    working_dir: /app
    command: >
      sh -c "
        bun next dev --hostname 0.0.0.0 --port 3001 --dir apps/api &
        bun next dev --hostname 0.0.0.0 --port 3000 --dir apps/web &
        bun next dev --hostname 0.0.0.0 --port 3003 --dir apps/admin &
        bun next dev --hostname 0.0.0.0 --port 3002 --dir apps/marketing &
        bun next dev --hostname 0.0.0.0 --port 3004 --dir apps/docs &
        wait -n
      "
    ports:
      - "3000:3000"  # web
      - "3001:3001"  # api
      - "3002:3002"  # marketing
      - "3003:3003"  # admin
      - "3004:3004"  # docs
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      deps:
        condition: service_completed_successfully
      electric:
        condition: service_started
    restart: unless-stopped
    networks:
      - superset-network

networks:
  superset-network:
    driver: bridge

volumes:
  node_modules:
  caddy_data:
  caddy_config:
